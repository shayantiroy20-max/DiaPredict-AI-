<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h2>🔐 Login</h2>
        <form method="POST">
            <input type="email"
                   name="email"
                   placeholder="Enter Email"
                   required>
            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>
            <button type="submit">
                Login
            </button>
        </form>
        <br>
        <a href="/register">
            Create New Account
        </a>
    </div>
</div>
</body>
</html>
